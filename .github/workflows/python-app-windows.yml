name: Build Windows Application (Folder Mode)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
# 设置环境变量，提前使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # 如果有 requirements.txt，取消下行注释
          pip install -r requirements.txt

      - name: Build with PyInstaller (Onedir)
        run: |
          # --onedir: 打包成一个包含 .exe 和所有依赖库的文件夹
          # --windowed: 如果是 GUI 程序请保留，命令行程序请删除
          # main.py 需替换为你仓库中的实际启动文件名
          # pyinstaller --onedir --windowed --name "WatermaskRemover" start_web.py
          pyinstaller -y --onedir --windowed --name "WatermaskRemover" `
            --add-data "config.yaml;." `
            --add-data "icon.icns;." `
            --add-data "web;web" `
            --add-data "src;src" `
            --add-data "utils;utils" `
            start_web.py
            
      - name: Zip the Output Folder
        # 文件夹模式直接上传很不方便，先压缩成一个 .zip 文件
        run: |
          powershell Compress-Archive -Path dist/WatermaskRemover -DestinationPath WatermaskRemover_Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatermaskRemover-Full-Package
          path: WatermaskRemover_Windows.zip
